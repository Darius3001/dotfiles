[colors]
background = #101015
background-alt = #373B41
foreground = #FFF
primary = #8D73EB
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/Bar]
width = 100%
height = 20pt
radius = 0

;dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=11;2

modules-left = xworkspaces xwindow
modules-right = battery backlight alsa xkeyboard memory cpu wlan eth terminal searchapps powermenu
modules-center = date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true
[module/terminal]
type = custom/text
content = "ÔíČ "
click-left = kitty

[module/searchapps]
type = custom/text
content = "ÔÄā "
click-left = rofi run -show drun

[module/powermenu]
type = custom/text
content = "ÔÄĎ "
click-left = rofi -show powermenu -modi powermenu:rofi-power-menu

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/battery]
type = internal/battery

battery = BAT1
adapter = ADP1
full-at = 99
low-at = 5

time-format = %H:%M

format-charging = <animation-charging>  <label-charging>
format-discharging = <ramp-capacity>  <label-discharging>

format-full-prefix = "ÔČÄ  "

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%
label-low = BATTERY LOW

animation-low-foreground = ${colors.alert}

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

bar-capacity-width = 10

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750

animation-discharging-0 = ÔČÄ
animation-discharging-1 = ÔČĀ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČÉ
animation-discharging-4 = ÔČĄ
animation-discharging-framerate = 500

animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

[module/backlight]
type = internal/backlight

; Change it for yourself
; ls -1 /sys/class/backlight/

card = intel_backlight
use-actual-brightness = true
enable-scroll = true

format = <ramp>  <label>
format-background = ${color.background}

label =%percentage%%

ramp-0 =ůĪ©é
ramp-1 =ůĪ©Ź
ramp-2 =ůĪ©ź
ramp-3 =ůĪ©Ď
ramp-4 =ůĪ©í
ramp-5 =ůĪ©ď
ramp-6 =ůĪ©Ē
ramp-7 =ůĪ©ē
ramp-8 =ůĪ©Ė

ramp-foreground = ${color.yellow}

[module/alsa]
type = internal/alsa

format-volume = <ramp-volume> <label-volume>

label-volume = %percentage%%

label-muted = "ůįĚü  %percentage%%"
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = "ůįēŅ "
ramp-volume-1 = "ůįĖÄ "
ramp-volume-2 = "ůįēĺ "

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
format-prefix = "ÔĄú  "

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "Ó™Ė "
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ  "
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless

label-connected = "%essid%"
format-connected = <ramp-signal>  <label-connected>

label-disconnected = "ůį§ģ "
format-disconnected = <label-disconnected>

label-packetloss = "%essid%"
format-packetloss = <ramp-packetloss>  <label-packetloss>

ramp-signal-0 = ůį§®
ramp-signal-1 = ůį§•
ramp-signal-2 = ůį§Ę
ramp-signal-3 = ůį§ü
ramp-signal-4 = ůį§Į

ramp-packetloss-0 = ůį§©
ramp-packetloss-1 = ůį§¶
ramp-packetloss-2 = ůį§£
ramp-packetloss-3 = ůį§†
ramp-packetloss-4 = ůį§ę

; [module/eth]
; inherit = network-base
; interface-type = wired
; label-connected = %local_ip%
; format-connected-prefix = "ůįąĀ "

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %d.%m.%Y %H:%M:%S

label = %date%

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
